<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhishLens</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="brand">
      <svg class="lens-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="1.6"/>
        <line x1="15.3" y1="15.3" x2="21" y2="21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="10.5" y1="7" x2="10.5" y2="14" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
        <line x1="7" y1="10.5" x2="14" y2="10.5" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
      </svg>
      <h1>PhishLens</h1>
    </header>
    <p class="subtitle">Paste a suspicious email and get an instant risk analysis</p>
    <div class="examples-bar">
  <span class="examples-label">Try an example:</span>
  <button class="example-btn" data-example="microsoft">Microsoft Phish</button>
  <button class="example-btn" data-example="bank">Bank Phish</button>
  <button class="example-btn" data-example="clean">Legit Email</button>
</div>

    <div id="inputWrapper" class="input-wrapper">
      <textarea id="emailInput" rows="10" placeholder="Paste a suspicious email here..."></textarea>
      <div class="scan-line"></div>
    </div>

    <button id="analyzeBtn">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="1.8"/>
        <line x1="15.3" y1="15.3" x2="21" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      Analyze Email
    </button>

    <div id="loadingState" class="hidden">Scanning email for risk signals...</div>

    <div id="resultCard" class="hidden">
      <div class="score-section">
        <div class="score-block">
          <span class="eyebrow">Risk score</span>
          <div id="scoreCircle" class="score-circle">
            <span id="scoreNumber">0</span>
          </div>
          <button id="resetBtn" class="reset-btn hidden">Clear & Scan Again</button>
        </div>
        <div id="verdictLabel" class="verdict"></div>
      </div>

      <div class="flags-section">
        <span class="eyebrow">Why this score</span>
        <ul id="flagsList"></ul>
      </div>

      <div class="ai-section">
        <span class="eyebrow">AI analysis</span>
        <p id="aiReasoning"></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
